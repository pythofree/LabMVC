{% extends 'expenses/base.html' %}
{% block title %}Delete - ExpenseTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger">
            <div class="card-body p-5 text-center">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem"></i>
                <h4 class="mt-3">Are you sure?</h4>
                <p class="text-muted">You are about to delete <strong>{{ object }}</strong>. This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4 me-2">Yes, delete</button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
